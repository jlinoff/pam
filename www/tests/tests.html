  <div id="x-summary" class="summary">Running...</div>

// ---------------------------------------------------------------------------
// Test runner
// ---------------------------------------------------------------------------
let _passed = 0
let _failed = 0
let _currentSuite = null
const _results = document.getElementById('x-results')

function suite(name) {
  _currentSuite = name
  const h = document.createElement('h2')
  h.textContent = name
  h.id = 'suite-' + name.replace(/\s+/g, '-').toLowerCase()
  _results.appendChild(h)
}

function test(name, fn) {
  const line = document.createElement('div')
  line.className = 'test-line'
  try {
    fn()
    _passed++
    line.classList.add('pass')
    line.textContent = '✓ ' + name
  } catch(e) {
    _failed++
    line.classList.add('fail')
    line.textContent = '✗ ' + name
    const pre = document.createElement('pre')
    pre.textContent = e.message || String(e)
    line.appendChild(pre)
  }
  _results.appendChild(line)
}

function assert(condition, msg) {
  if (!condition) throw new Error('assert failed: ' + (msg || '(no message)'))
}

function assertEqual(a, b, msg) {
  if (a !== b) throw new Error((msg || 'assertEqual') + '\n  expected: ' + JSON.stringify(b) + '\n  actual:   ' + JSON.stringify(a))
}

function assertNotEqual(a, b, msg) {
  if (a === b) throw new Error((msg || 'assertNotEqual') + ': values are equal: ' + JSON.stringify(a))
}

function assertThrows(fn, msg) {
  let threw = false
  try { fn() } catch(e) { threw = true }
  if (!threw) throw new Error((msg || 'assertThrows') + ': expected exception was not thrown')
}

function finalize() {
  const el = document.getElementById('x-summary')
  const total = _passed + _failed
  el.textContent = `${total} tests: ${_passed} passed, ${_failed} failed`
  el.className = 'summary ' + (_failed === 0 ? 'all-pass' : 'has-fail')
  // expose result for ChromeDriver to read
  window.__TEST_RESULTS__ = { passed: _passed, failed: _failed, total }
}

// Build a minimal DOM fixture: #records-accordion with some records
function makeAccordionItem(title, active, fields) {
  const item = xmk('div').xClass('accordion-item')
  const button = xmk('button').xClass('accordion-button')
  button.innerHTML = title
  button.setAttribute('x-active', active ? 'true' : 'false')
  item.appendChild(button)
  // add field name and value elements
  if (fields) {
    fields.forEach(([name, type, value]) => {
      const nameEl = xmk('span').xClass('x-fld-name')
      nameEl.innerHTML = name
      const valEl = xmk('span').xClass('x-fld-value')
      valEl.setAttribute('data-fld-type', type)
      valEl.setAttribute('data-fld-raw-value', value)
      item.appendChild(nameEl)
      item.appendChild(valEl)
    })
  }
  return item
}

// crypt.js — v1 regression baseline (MUST PASS — locked before any crypto changes)
// ---------------------------------------------------------------------------
import { encrypt, decrypt } from '/js/crypt.js'

// Helper: wrap callback-based encrypt/decrypt in Promises
function encryptAsync(password, plaintext) {
  return new Promise((resolve, reject) => {
    // We need a real #status element (already added above)
    encrypt(password, plaintext, 'test.pam', (ciphertext, _filename) => {
      resolve(ciphertext)
    })
    // timeout failsafe
    setTimeout(() => reject(new Error('encrypt timed out')), 5000)
  })
}

function decryptAsync(password, ciphertext) {
  return new Promise((resolve, reject) => {
    decrypt(password, ciphertext,
      (plaintext) => resolve({ ok: true, plaintext }),
      (errMsg)   => resolve({ ok: false, error: errMsg })
    )
    setTimeout(() => reject(new Error('decrypt timed out')), 5000)
  })
}

// Async test wrapper — runs after sync tests
async function runCryptTests() {
  suite('crypt.js — v1 regression baseline')

  // Test 1: encrypt then decrypt round-trip
  await (async () => {
    const label = 'encrypt/decrypt round-trip with known password'
    try {
      const plaintext = '{"records":[],"version":1}'
      const password  = 'test-password-phase1'
      const ciphertext = await encryptAsync(password, plaintext)
      assert(typeof ciphertext === 'string', 'ciphertext should be a string')
      assertNotEqual(ciphertext, plaintext, 'ciphertext should differ from plaintext')
      const result = await decryptAsync(password, ciphertext)
      assert(result.ok, 'decryption should succeed: ' + (result.error || ''))
      assertEqual(result.plaintext, plaintext, 'decrypted text should match original')
      _passed++
      const line = document.createElement('div')
      line.className = 'test-line pass'
      line.textContent = '✓ ' + label
      _results.appendChild(line)
    } catch(e) {
      _failed++
      const line = document.createElement('div')
      line.className = 'test-line fail'
      line.textContent = '✗ ' + label
      const pre = document.createElement('pre')
      pre.textContent = e.message || String(e)
      line.appendChild(pre)
      _results.appendChild(line)
    }
  })()

  // Test 2: wrong password fails
  await (async () => {
    const label = 'wrong password produces decryption failure'
    try {
      const plaintext  = '{"records":[],"version":1}'
      const ciphertext = await encryptAsync('correct-password', plaintext)
      const result = await decryptAsync('wrong-password', ciphertext)
      assert(!result.ok, 'decryption with wrong password should fail')
      _passed++
      const line = document.createElement('div')
      line.className = 'test-line pass'
      line.textContent = '✓ ' + label
      _results.appendChild(line)
    } catch(e) {
      _failed++
      const line = document.createElement('div')
      line.className = 'test-line fail'
      line.textContent = '✗ ' + label
      const pre = document.createElement('pre')
      pre.textContent = e.message || String(e)
      line.appendChild(pre)
      _results.appendChild(line)
    }
  })()

  // Test 3: empty plaintext passes through unchanged
  await (async () => {
    const label = 'empty plaintext passes through encrypt unchanged'
    try {
      const result = await encryptAsync('password', '')
      assertEqual(result, '', 'empty plaintext should return empty string')
      _passed++
      const line = document.createElement('div')
      line.className = 'test-line pass'
      line.textContent = '✓ ' + label
      _results.appendChild(line)
    } catch(e) {
      _failed++
      const line = document.createElement('div')
      line.className = 'test-line fail'
      line.textContent = '✗ ' + label
      const pre = document.createElement('pre')
      pre.textContent = e.message || String(e)
      line.appendChild(pre)
      _results.appendChild(line)
    }
  })()

  // Test 4: two encryptions of the same plaintext produce different ciphertexts (random IV)
  await (async () => {
    const label = 'each encryption produces a different ciphertext (random IV/salt)'
    try {
      const plaintext = '{"records":[]}'
      const password  = 'same-password'
      const c1 = await encryptAsync(password, plaintext)
      const c2 = await encryptAsync(password, plaintext)
      assertNotEqual(c1, c2, 'two encryptions of the same plaintext should differ due to random IV')
      _passed++
      const line = document.createElement('div')
      line.className = 'test-line pass'
      line.textContent = '✓ ' + label
      _results.appendChild(line)
    } catch(e) {
      _failed++
      const line = document.createElement('div')
      line.className = 'test-line fail'
      line.textContent = '✗ ' + label
      const pre = document.createElement('pre')
      pre.textContent = e.message || String(e)
      line.appendChild(pre)
      _results.appendChild(line)
    }
  })()

  // Test 5: plaintext without password passes through unchanged
  await (async () => {
    const label = 'plaintext JSON without password passes through unchanged'
    try {
      const plaintext = '{"records":[]}'
      const result = await encryptAsync('', plaintext)
      assertEqual(result, plaintext, 'no-password encrypt should return plaintext unchanged')
      _passed++
      const line = document.createElement('div')
      line.className = 'test-line pass'
      line.textContent = '✓ ' + label
      _results.appendChild(line)
    } catch(e) {
      _failed++
      const line = document.createElement('div')
      line.className = 'test-line fail'
      line.textContent = '✗ ' + label
      const pre = document.createElement('pre')
      pre.textContent = e.message || String(e)
      line.appendChild(pre)
      _results.appendChild(line)
    }
  })()

  finalize()
}

suite('SEC-006 revert — prefs lock uses plaintext comparison')

    'lockPreferencesPassword should default to empty string')
})
test('lockPreferencesPassword is stored as plaintext (not a hash)', () => {
  // A SHA-256 hash would be a 64-char hex string. A plaintext password is not.
  // Set a known value and confirm it is stored verbatim.
  const saved = window.prefs.lockPreferencesPassword
  window.prefs.lockPreferencesPassword = 'my-test-password'
  assertEqual(window.prefs.lockPreferencesPassword, 'my-test-password',
    'lockPreferencesPassword should be stored as plaintext')
  assert(window.prefs.lockPreferencesPassword.length !== 64,
    'plaintext password should not look like a SHA-256 hash')
  window.prefs.lockPreferencesPassword = saved
})
