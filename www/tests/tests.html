  <div id="x-summary" class="summary">Running...</div>

  statusMsgDurationMS: 1500,

  searchCaseInsensitive: true,
  searchRecordTitles: true,
  searchRecordFieldNames: true,

  memorablePasswordWordSeparator: '-',
  memorablePasswordMinWordLength: 3,

  memorablePasswordMinWords: 2,

  memorablePasswordPrefix: '',
  memorablePasswordSuffix: '',

  passwordRangeMaxLength: 64,
  passwordRangeLengthDefault: 16,

  filePassCache: 'session',

  lockPreferencesPassword: '',

// ---------------------------------------------------------------------------
// Test runner
// ---------------------------------------------------------------------------
let _passed = 0
let _failed = 0
let _currentSuite = null
const _results = document.getElementById('x-results')

function suite(name) {
  _currentSuite = name
  const h = document.createElement('h2')
  h.textContent = name
  h.id = 'suite-' + name.replace(/\s+/g, '-').toLowerCase()
  _results.appendChild(h)
}

function test(name, fn) {
  const line = document.createElement('div')
  line.className = 'test-line'
  try {
    fn()
    _passed++
    line.classList.add('pass')
    line.textContent = '✓ ' + name
  } catch(e) {
    _failed++
    line.classList.add('fail')
    line.textContent = '✗ ' + name
    const pre = document.createElement('pre')
    pre.textContent = e.message || String(e)
    line.appendChild(pre)
  }
  _results.appendChild(line)
}

function assert(condition, msg) {
  if (!condition) throw new Error('assert failed: ' + (msg || '(no message)'))
}

function assertEqual(a, b, msg) {
  if (a !== b) throw new Error((msg || 'assertEqual') + '\n  expected: ' + JSON.stringify(b) + '\n  actual:   ' + JSON.stringify(a))
}

function assertNotEqual(a, b, msg) {
  if (a === b) throw new Error((msg || 'assertNotEqual') + ': values are equal: ' + JSON.stringify(a))
}

function assertThrows(fn, msg) {
  let threw = false
  try { fn() } catch(e) { threw = true }
  if (!threw) throw new Error((msg || 'assertThrows') + ': expected exception was not thrown')
}

function finalize() {
  const el = document.getElementById('x-summary')
  const total = _passed + _failed
  el.textContent = `${total} tests: ${_passed} passed, ${_failed} failed`
  el.className = 'summary ' + (_failed === 0 ? 'all-pass' : 'has-fail')
  // expose result for ChromeDriver to read
  window.__TEST_RESULTS__ = { passed: _passed, failed: _failed, total }
}

// crypt.js — v1 regression baseline (MUST PASS — locked before any crypto changes)
// ---------------------------------------------------------------------------
import { encrypt, decrypt, encryptV2, decryptV2 } from '/js/crypt.js'

// Helper: wrap callback-based encrypt/decrypt in Promises
function encryptAsync(password, plaintext) {
  return new Promise((resolve, reject) => {
    // We need a real #status element (already added above)
    encrypt(password, plaintext, 'test.pam', (ciphertext, _filename) => {
      resolve(ciphertext)
    })
    // timeout failsafe
    setTimeout(() => reject(new Error('encrypt timed out')), 5000)
  })
}

function decryptAsync(password, ciphertext) {
  return new Promise((resolve, reject) => {
    decrypt(password, ciphertext,
      (plaintext) => resolve({ ok: true, plaintext }),
      (errMsg)   => resolve({ ok: false, error: errMsg })
    )
    setTimeout(() => reject(new Error('decrypt timed out')), 5000)
  })
}

function encryptV2Async(password, plaintext) {
  return new Promise((resolve, reject) => {
    encryptV2(password, plaintext, 'test.pam', (ciphertext, _filename) => {
      resolve(ciphertext)
    })
    setTimeout(() => reject(new Error('encryptV2 timed out')), 5000)
  })
}

function decryptV2Async(password, ciphertext) {
  return new Promise((resolve, reject) => {
    decryptV2(password, ciphertext,
      (plaintext) => resolve({ ok: true, plaintext }),
      (errMsg)   => resolve({ ok: false, error: errMsg })
    )
    setTimeout(() => reject(new Error('decryptV2 timed out')), 5000)
  })
}

// Async test wrapper — runs after sync tests
async function runCryptTests() {
  suite('crypt.js — v1 regression baseline')

  // Test 1: encrypt then decrypt round-trip
  await (async () => {
    const label = 'encrypt/decrypt round-trip with known password'
    try {
      const plaintext = '{"records":[],"version":1}'
      const password  = 'test-password-phase1'
      const ciphertext = await encryptAsync(password, plaintext)
      assert(typeof ciphertext === 'string', 'ciphertext should be a string')
      assertNotEqual(ciphertext, plaintext, 'ciphertext should differ from plaintext')
      const result = await decryptAsync(password, ciphertext)
      assert(result.ok, 'decryption should succeed: ' + (result.error || ''))
      assertEqual(result.plaintext, plaintext, 'decrypted text should match original')
      _passed++
      const line = document.createElement('div')
      line.className = 'test-line pass'
      line.textContent = '✓ ' + label
      _results.appendChild(line)
    } catch(e) {
      _failed++
      const line = document.createElement('div')
      line.className = 'test-line fail'
      line.textContent = '✗ ' + label
      const pre = document.createElement('pre')
      pre.textContent = e.message || String(e)
      line.appendChild(pre)
      _results.appendChild(line)
    }
  })()

// ---------------------------------------------------------------------------
// SEC-005 — Double callback bug in encrypt() / decrypt()
// Missing `return` after early-exit callback() calls causes double-invocation.
// These tests assert callbacks fire EXACTLY ONCE on edge-case inputs.
// ---------------------------------------------------------------------------

suite('SEC-005 — encrypt() callback fires exactly once (sync edge cases)')
test('empty plaintext: callback fires exactly once', () => {
  let count = 0
  // Import is already done above — use the already-imported encrypt
  // We test the sync early-exit paths by counting callback invocations
  // encrypt() with empty plaintext should call callback(plaintext, filename) once and stop
  encrypt('', '', 'test.pam', (ct, fn) => { count++ })
  // Give any sync fallthrough a tick to manifest
  assertEqual(count, 1, 'callback should fire exactly once for empty plaintext')
})

test('empty password with non-JSON plaintext: callback fires exactly once', () => {
  let count = 0
  // plaintext[0] !== '{' AND password is empty — hits both callback paths if return is missing
  encrypt('', 'not-json-content', 'test.pam', (ct, fn) => { count++ })
  assertEqual(count, 1, 'callback should fire exactly once for empty password + non-JSON plaintext')
})

test('empty password with JSON plaintext: callback fires exactly once', () => {
  let count = 0
  // plaintext[0] === '{' AND password is empty — should call callback once (write plaintext)
  encrypt('', '{"records":[]}', 'test.pam', (ct, fn) => { count++ })
  assertEqual(count, 1, 'callback should fire exactly once for empty password + JSON plaintext')
})

suite('SEC-005 — decrypt() callback fires exactly once (sync edge cases)')
test('empty ciphertext: callback fires exactly once', () => {
  let count = 0
  let count2 = 0
  decrypt('', '', (pt) => { count++ }, (err) => { count2++ })
  assertEqual(count, 1, 'callback should fire exactly once for empty ciphertext')
  assertEqual(count2, 0, 'error callback should not fire for empty ciphertext')
})

test('empty password with non-JSON ciphertext: error callback fires exactly once', () => {
  let count = 0
  let count2 = 0
  // ciphertext[0] !== '{' AND password is empty — needs password, should call callback2 once
  decrypt('', 'not-json', (pt) => { count++ }, (err) => { count2++ })
  assertEqual(count, 0, 'success callback should not fire')
  assertEqual(count2, 1, 'error callback should fire exactly once')
})

test('empty password with JSON ciphertext: callback fires exactly once', () => {
  let count = 0
  let count2 = 0
  // ciphertext[0] === '{' AND password is empty — already decrypted, call callback once
  decrypt('', '{"records":[]}', (pt) => { count++ }, (err) => { count2++ })
  assertEqual(count, 1, 'callback should fire exactly once for JSON ciphertext with no password')
  assertEqual(count2, 0, 'error callback should not fire')
})

// ---------------------------------------------------------------------------
// BUG-002: password stored in wrong bucket when file's filePassCache differs
// from the active strategy at load time (manifests as lost password on iOS
// PWA relaunch when the file specifies 'local' but startup defaulted to 'session').
// ---------------------------------------------------------------------------
suite('BUG-002 — filePassCache strategy mismatch on load')
test('password re-stored in correct bucket after file prefs override strategy', () => {
  // Simulate startup state: active strategy is 'session' (compiled-in default)
  window.prefs.filePassCache = 'session'
  sessionStorage.removeItem('filePass')
  localStorage.removeItem('filePass')

  // Simulate setFilePass() being called during load mechanics (before loadCallback)
  setFilePass('hunter2')
  assertEqual(sessionStorage.getItem('filePass'), 'hunter2',
    'password should initially land in sessionStorage when strategy is session')
  assertEqual(localStorage.getItem('filePass'), null,
    'localStorage should be empty before strategy switch')

  // Simulate loadCallback applying file prefs that specify 'local'
  window.prefs.filePassCache = 'local'
  setFilePass('hunter2')  // the fix: re-store under the now-correct strategy

  assertEqual(localStorage.getItem('filePass'), 'hunter2',
    'password should be in localStorage after strategy switches to local')
  assertEqual(getFilePass(), 'hunter2',
    'getFilePass() should return the password after strategy switch')

  // Cleanup
  clearFilePass()
  sessionStorage.removeItem('filePass')  // clear the old bucket too
  localStorage.removeItem('pamCacheStrategy')
  window.prefs.filePassCache = 'session'
})
test('old sessionStorage bucket does not survive simulated PWA relaunch', () => {
  // Simulate the pre-fix failure: password stored under 'session' but prefs say 'local'
  window.prefs.filePassCache = 'session'
  setFilePass('hunter2')
  // Switch strategy without re-storing (what happened before the fix)
  window.prefs.filePassCache = 'local'
  // Simulate iOS PWA relaunch: sessionStorage is wiped
  sessionStorage.clear()
  // Without the fix, getFilePass() returns '' here
  assertEqual(getFilePass(), '',
    'without re-storing, password is lost after sessionStorage wipe — confirms the bug existed')
  // Cleanup
  localStorage.removeItem('filePass')
  window.prefs.filePassCache = 'session'
})
test('no cross-bucket leak: re-storing clears old sessionStorage entry', () => {
  window.prefs.filePassCache = 'session'
  sessionStorage.removeItem('filePass')
  localStorage.removeItem('filePass')
  setFilePass('hunter2')
  assertEqual(sessionStorage.getItem('filePass'), 'hunter2', 'in sessionStorage initially')

  // Apply fix: clear old bucket, switch strategy, re-store
  clearFilePass()  // removes from sessionStorage
  window.prefs.filePassCache = 'local'
  setFilePass('hunter2')

  assertEqual(sessionStorage.getItem('filePass'), null,
    'old sessionStorage bucket should be cleared after strategy switch')
  assertEqual(localStorage.getItem('filePass'), 'hunter2',
    'password should be in new localStorage bucket')

  // Cleanup
  clearFilePass()
  window.prefs.filePassCache = 'session'
})

suite('load.js — duplicate strategy logic')
test('ignore strategy skips duplicate titles', () => {
  // Simulate the ignore branch: findRecord returns truthy, strategy is ignore
  // We test the logic directly rather than through loadCallback DOM dependencies
  const existingTitles = new Set(['Amazon', 'Google'])
  const strategy = 'ignore'
  let loaded = []
  const records = [
    { title: 'Amazon', fields: [] },
    { title: 'GitHub', fields: [] },
  ]
  for (const rec of records) {
    if (existingTitles.has(rec.title)) {
      if (strategy === 'ignore') continue
    }
    loaded.push(rec.title)
  }
  assert(!loaded.includes('Amazon'), 'ignore should skip duplicate Amazon')
  assert(loaded.includes('GitHub'), 'ignore should load new GitHub')
})
test('replace strategy removes duplicate before inserting', () => {
  const existingTitles = new Set(['Amazon'])
  const strategy = 'replace'
  let deleted = []
  let loaded = []
  const records = [{ title: 'Amazon', fields: [] }]
  for (const rec of records) {
    if (existingTitles.has(rec.title)) {
      if (strategy === 'replace') {
        deleted.push(rec.title)
        existingTitles.delete(rec.title)
      }
    }
    loaded.push(rec.title)
  }
  assert(deleted.includes('Amazon'), 'replace should delete existing Amazon')
  assert(loaded.includes('Amazon'), 'replace should then load Amazon')
})
test('allow strategy generates unique title for duplicate', () => {
  const existingTitles = new Set(['Amazon', 'Amazon Clone'])
  const strategy = 'allow'
  let title = 'Amazon'
  if (existingTitles.has(title) && strategy === 'allow') {
    let provisional = title + ' Clone'
    let idx = 0
    while (existingTitles.has(provisional)) {
      idx++
      provisional = `${title} Clone${idx}`
    }
    title = provisional
  }
  assertEqual(title, 'Amazon Clone1',
    'allow should generate Amazon Clone1 when Amazon Clone exists')
})

suite('pam.css — dark mode badge contrast')
test('badge has muted background in dark mode', () => {
  // Inject the pam.css rule into the test document
  const style = document.createElement('style')
  style.id = 'x-pam-css-test'
  style.textContent = `
    [data-bs-theme="dark"] .badge.bg-warning {
      background-color: #7a6000 !important;
      color: #f0c040 !important;
    }
  `
  document.head.appendChild(style)

  // Set dark mode on body
  document.body.setAttribute('data-bs-theme', 'dark')

  const badge = document.createElement('span')
  badge.classList.add('badge', 'bg-warning')
  document.body.appendChild(badge)

  const bg = getComputedStyle(badge).backgroundColor
  // rgb(122, 96, 0) === #7a6000
  assertEqual(bg, 'rgb(122, 96, 0)',
    'badge background should be muted amber in dark mode')

  badge.remove()
  document.body.removeAttribute('data-bs-theme')
  style.remove()
})

test('badge retains warning background in light mode', () => {
